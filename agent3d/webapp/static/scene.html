<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>实景模型 · 浏览查看</title>
<style>
  :root{
    color-scheme:dark;
    --bg:#0f1216; --panel:#12161c; --card:#151a21; --line:#232830; --line2:#2a303a;
    --text:#e6e8eb; --muted:#8a919c; --accent:#3a7afe; --ok:#34d399;
    --input:#0f141a; --nav-bg:#232a34; --nav-hover:#2b333f;
    --accent-glow:rgba(58,122,254,.15); --hover-border:#39424d; --desc:#7f8894; --novox:#c9a24a;
    --hint:#6b7280; --stage1:#1a2030; --stage2:#12151a;
  }
  *{box-sizing:border-box}
  body{margin:0;height:100vh;overflow:hidden;font-family:system-ui,"Segoe UI",sans-serif;
    background:var(--bg);color:var(--text)}

  header{height:56px;padding:0 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  header h1{font-size:16px;margin:0}
  header .sub{color:var(--muted);font-size:12.5px}
  header #topnav{margin-left:auto}

  main{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 57px)}

  /* ---------- sidebar: generated-model picker ---------- */
  #side{border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;background:var(--panel)}
  .side-h{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between}
  .side-h b{font-size:13.5px}
  .side-h button{background:var(--nav-bg);border:0;color:var(--muted);font-size:12px;padding:5px 11px;border-radius:7px;
    cursor:pointer;transition:.15s}
  .side-h button:hover{background:var(--nav-hover);color:var(--text)}
  #search{margin:0 16px 8px;padding:8px 10px;background:var(--input);border:1px solid var(--line2);border-radius:8px;
    color:var(--text);font-size:13px;font-family:inherit}
  #search:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
  #count{margin:0 16px 6px;font-size:11px;color:var(--muted)}
  #list{flex:1;overflow:auto;padding:2px 12px 16px}

  .scene{border:1px solid var(--line);background:var(--card);border-radius:11px;padding:11px 12px;margin:8px 0;
    cursor:pointer;transition:transform .14s,border-color .14s,box-shadow .14s}
  .scene:hover{border-color:var(--hover-border);transform:translateY(-1px)}
  .scene.active{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
  .scene .nm{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .scene .meta{font-size:11.5px;color:var(--muted);margin-top:5px;display:flex;flex-wrap:wrap;gap:4px 10px}
  .scene .meta .novox{color:var(--novox)}
  .scene .desc{font-size:11.5px;color:var(--desc);margin-top:6px;line-height:1.45;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .empty{color:var(--muted);font-size:13px;padding:26px 16px;text-align:center;line-height:1.8}
  .empty a{color:var(--accent);text-decoration:none}
  .empty a:hover{text-decoration:underline}

  /* ---------- stage: embedded viewer (GLB / 剖析, no strike) ---------- */
  #stage{position:relative;display:flex;flex-direction:column;background:radial-gradient(120% 120% at 50% 0%,var(--stage1),var(--stage2) 70%)}
  #stagewrap{position:relative;flex:1;min-height:0}
  #stagewrap iframe{width:100%;height:100%;border:0;opacity:0;transition:opacity .5s}
  #stagewrap iframe.show{opacity:1}
  #hint{position:absolute;inset:0;display:flex;flex-direction:column;gap:14px;align-items:center;
    justify-content:center;color:var(--hint);font-size:14px;pointer-events:none;text-align:center;padding:20px}
  #hint .ico{font-size:46px;animation:float 3.4s ease-in-out infinite}
  #hint.gone{display:none}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header>
  <h1>🌆 实景模型</h1>
  <span class="sub">选建筑 → 查看写实 3D · 剖析</span>
  <div id="topnav"></div>
</header>
<main>
  <aside id="side">
    <div class="side-h"><b>已生成模型</b><button id="refresh" title="重新加载列表">刷新</button></div>
    <input id="search" placeholder="搜索名称 / ID …">
    <div id="count"></div>
    <div id="list"><div class="empty">加载中 …</div></div>
  </aside>
  <section id="stage">
    <div id="stagewrap">
      <iframe id="viewer" title="实景查看器" allow="fullscreen" hidden></iframe>
      <div id="hint"><span class="ico">🏛️</span><span id="hintmsg">从左侧选择一个模型开始查看</span></div>
    </div>
  </section>
</main>

<script>
const listEl = document.getElementById('list');
const viewer = document.getElementById('viewer');
const hint   = document.getElementById('hint');
const hintMsg= document.getElementById('hintmsg');
const search = document.getElementById('search');
const countEl= document.getElementById('count');
let scenes = [], activeId = null;

const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtCount = n => (n == null ? '—' : Number(n).toLocaleString());
function fmtTime(ts){
  if (!ts) return '';
  const d = new Date(ts * 1000), p = x => String(x).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

async function load(){
  listEl.innerHTML = '<div class="empty">加载中 …</div>';
  try{
    const r = await fetch('/api/scenes');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    scenes = (await r.json()).scenes || [];
    render();
    // deep-link support: /scene.html?scene=<id> preselects that model
    const want = new URLSearchParams(location.search).get('scene');
    if (want && !activeId && scenes.some(s => s.id === want)) pick(want);
  }catch(e){
    listEl.innerHTML = '<div class="empty">加载失败：' + esc(e.message || e) + '</div>';
  }
}

function render(){
  const kw = search.value.trim().toLowerCase();
  const rows = scenes.filter(s => !kw ||
    (s.name || '').toLowerCase().includes(kw) || s.id.toLowerCase().includes(kw));
  countEl.textContent = scenes.length ? `共 ${scenes.length} 个模型` : '';
  if (!rows.length){
    listEl.innerHTML = scenes.length
      ? '<div class="empty">没有匹配的模型</div>'
      : '<div class="empty">还没有生成的模型。<br><a href="/">去生成模型页生成一个 →</a></div>';
    return;
  }
  listEl.innerHTML = '';
  for (const s of rows){
    const el = document.createElement('div');
    el.className = 'scene' + (s.id === activeId ? ' active' : '');
    const vox = s.has_voxels
      ? `<span>🧱 ${fmtCount(s.voxel_count)} 块${s.blocks_per_meter ? ' · ' + s.blocks_per_meter + '/米' : ''}</span>`
      : `<span class="novox">⚪ 未生成体素</span>`;
    el.innerHTML =
      `<div class="nm">${esc(s.name || s.id)}</div>` +
      `<div class="meta">${vox}<span>${fmtTime(s.mtime)}</span></div>` +
      (s.description ? `<div class="desc">${esc(s.description)}</div>` : '');
    el.onclick = () => pick(s.id);
    listEl.appendChild(el);
  }
}

function loadViewer(id){
  hint.classList.add('gone');
  viewer.hidden = false;
  viewer.classList.remove('show');
  viewer.onload = () => viewer.classList.add('show');
  // nostrike=1 hides the 打击 button; land in the realistic GLB view with 剖析 available.
  viewer.src = `/viewer.html?scene=${encodeURIComponent(id)}&nostrike=1&t=${Date.now()}`;
}

function pick(id){
  activeId = id;
  render();                       // refresh active highlight
  loadViewer(id);
}

document.getElementById('refresh').onclick = load;
search.addEventListener('input', render);
load();
</script>
<script src="/nav.js"></script>
</body>
</html>
